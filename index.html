<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Aikya I/O | AI Learning Marketplace</title>
    <meta name="description" content="Create, learn, practice, and earn certifications with AI-powered courses, quizzes, flashcards, and interactive learning experiences on Aikya I/O." />
    <meta name="keywords" content="AI learning, online courses, certification, e-learning, practice, quizzes, flashcards, learning marketplace, Aikya IO" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="author" content="Aikya I/O" />

    <!-- Canonical -->
    <link rel="canonical" href="https://aikya.io" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aikya I/O" />
    <meta property="og:title" content="Aikya I/O | AI Learning Marketplace" />
    <meta property="og:description" content="Create, learn, practice, and earn certifications with AI-powered courses, quizzes, flashcards, and interactive learning experiences." />
    <meta property="og:image" content="https://aikya.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://aikya.io" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@aikyaio" />
    <meta name="twitter:title" content="Aikya I/O | AI Learning Marketplace" />
    <meta name="twitter:description" content="Create, learn, practice, and earn certifications with AI-powered courses, quizzes, flashcards, and interactive learning experiences." />
    <meta name="twitter:image" content="https://aikya.io/og-image.png" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Aikya I/O",
      "url": "https://aikya.io",
      "logo": "https://aikya.io/logo-light.svg",
      "description": "AI-powered learning marketplace for courses, practice, certifications, and creator monetization.",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@aikya.io"
      }
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Aikya I/O",
      "url": "https://aikya.io",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://aikya.io/courses?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </body>
</html>
